name: PR Docker Build Dry Run

on:
  pull_request:
    paths:
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-dryrun:
    name: Docker Build Dry Run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target.name }} image
        run: |
          docker build -f ${{ matrix.target.dockerfile }} ${{ matrix.target.context }}
